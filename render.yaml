# Render Blueprint — defines a free web service + free Postgres database.
# When you connect this repo on Render, it reads this file and provisions
# everything for you.
#
# Free tier notes:
#   - The web service spins down after 15 min idle and takes ~30s to wake up.
#   - The free Postgres expires 90 days after creation. Upgrade to a paid
#     instance ($7/mo) before then if you want to keep your data.

services:
  - type: web
    name: alum
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # On boot: --if-empty does an initial seed only if the DB is blank
    # (no-op otherwise), and ALWAYS prints the current schools + codes
    # to the logs at the end. Then gunicorn starts.
    startCommand: python seed.py --if-empty && gunicorn run:app
    envVars:
      - key: ALUM_SECRET
        generateValue: true       # Render generates a strong random value
      - key: DATABASE_URL
        fromDatabase:
          name: alum-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.9

databases:
  - name: alum-db
    plan: free
    databaseName: alum
    user: alum
