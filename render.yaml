# Render Blueprint — defines a free web service + free Postgres database.
# When you connect this repo on Render, it reads this file and provisions
# everything for you.
#
# Free tier notes:
#   - The web service spins down after 15 min idle and takes ~30s to wake up.
#   - The free Postgres expires 90 days after creation. Upgrade to a paid
#     instance ($7/mo) before then if you want to keep your data.

services:
  - type: web
    name: alum
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # On every boot:
    #   1. --if-empty: initial seed if the DB is brand new (no-op otherwise)
    #   2. --add-only: insert any schools added to MANHATTAN_PRIVATE_HS since
    #      the last deploy (no-op if no new schools). Existing data is never
    #      touched. Prints the full school+code table to the deploy logs so
    #      you can find access codes anytime.
    #   3. Start gunicorn.
    startCommand: python seed.py --if-empty && python seed.py --add-only && gunicorn run:app
    envVars:
      - key: ALUM_SECRET
        generateValue: true       # Render generates a strong random value
      - key: DATABASE_URL
        fromDatabase:
          name: alum-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.9

databases:
  - name: alum-db
    plan: free
    databaseName: alum
    user: alum
